name: "🐛 Bug Report"
description: "Report a bug or crash in Luminary"
title: "[Bug]: "
labels: ["bug", "status/needs-triage"]
body:
  - type: textarea
    id: bug_desc
    attributes:
      label: "What happened & how to reproduce?"
      description: "A clear description of the bug and the steps to reproduce it."
      placeholder: |
        e.g., I uploaded a PDF and clicked on the 'Study' tab, but the app crashed.
        Steps:
        1. Click Upload.
        2. Open Study page...
    validations:
      required: true
  - type: input
    id: env_info
    attributes:
      label: "Environment Details"
      description: "Mention your OS, Ollama model, and app version."
      placeholder: "e.g., macOS M1, Llama 3.2 3B, Native install (make install)"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Error Logs or Screenshots"
      description: "Paste terminal logs from 'make dev' or drag-and-drop screenshots here."
      placeholder: "Paste backend/frontend log outputs..."
    validations:
      required: false
