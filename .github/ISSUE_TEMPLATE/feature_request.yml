name: "💡 Feature Request"
description: "Suggest an idea or enhancement for Luminary"
title: "[Feature]: "
labels: ["enhancement", "status/needs-triage"]
body:
  - type: textarea
    id: feature_desc
    attributes:
      label: "What feature would you like to see?"
      description: "Describe the idea and how it improves your learning experience."
      placeholder: "e.g., I would like to have keyboard shortcuts during flashcard reviews because..."
    validations:
      required: true
  - type: textarea
    id: logic_desc
    attributes:
      label: "How should it work?"
      description: "Provide any ideas on the user interface, keyboard controls, or local processing logic."
      placeholder: "e.g., Pressing Space flips the card, 1-3 grades it..."
    validations:
      required: false
