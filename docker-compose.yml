services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7820:7820"
    volumes:
      - luminary-data:/data
    environment:
      - LUMINARY_MODE=prod
      - LUMINARY_SURFACE_TIER=public
      - DATA_DIR=/data
      # Override Ollama host when running alongside the ollama service below
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    profiles:
      - ""
      - ai

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    profiles:
      - ai

volumes:
  luminary-data:
  ollama-models:
