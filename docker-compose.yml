services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7820:7820"
    volumes:
      - luminary-data:/data
    environment:
      - LUMINARY_MODE=prod
      - LUMINARY_SURFACE_TIER=public
      - DATA_DIR=/data
      # Point the backend at the ollama service. The backend reads OLLAMA_URL
      # (NOT OLLAMA_HOST); its default 127.0.0.1 would resolve to this container.
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    profiles:
      - ""
      - ai

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    profiles:
      - ai

  # One-shot: pull the default chat model into the ollama volume on first run,
  # then exit. Without this the sidecar starts empty and chat/generation fail.
  # OLLAMA_HOST here is the ollama CLI's own variable (where the server lives).
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint:
      - sh
      - -c
      - 'until ollama list >/dev/null 2>&1; do echo "waiting for ollama..."; sleep 2; done; ollama pull llama3.2'
    restart: "no"
    profiles:
      - ai

volumes:
  luminary-data:
  ollama-models:
